services:
  mcp-i14y:
    build: .
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
      I14Y_API_ENV: "${I14Y_API_ENV:-prod}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      SENTRY_SAMPLE_RATE: "${SENTRY_SAMPLE_RATE:-0.1}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
